<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Receipt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background-color: #0a0a0a;
      color: #e8e4dc;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    .bg-stain {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 80%, rgba(56,132,163,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .title { text-align: center; margin-bottom: 30px; position: relative; z-index: 1; }
    .title h1 {
      font-size: 13px; letter-spacing: 6px; text-transform: uppercase;
      color: #666; font-weight: 400;
    }
    .title .sub { font-size: 11px; color: #444; margin-top: 8px; letter-spacing: 2px; }
    .main {
      display: flex; gap: 40px; max-width: 900px; width: 100%;
      justify-content: center; align-items: flex-start; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .glass-section {
      display: flex; flex-direction: column; align-items: center;
      min-width: 200px; position: sticky; top: 20px;
    }
    .glass-label {
      font-size: 10px; letter-spacing: 3px; color: #555;
      margin-bottom: 16px; text-transform: uppercase;
    }
    .glass-container { position: relative; width: 120px; height: 220px; }
    .glass-outline {
      position: absolute; bottom: 0; left: 10px; right: 10px; height: 200px;
      border: 1px solid rgba(255,255,255,0.15); border-top: none;
      border-radius: 0 0 4px 4px; overflow: hidden;
    }
    .water-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .water-surface {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(120,200,230,0.4), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    .measure-line {
      position: absolute; left: 0; right: 0;
      border-top: 1px dashed rgba(255,255,255,0.06);
    }
    .drip {
      position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 8px; border-radius: 50%;
      background-color: rgba(56,163,193,0.5);
      animation: drip 1s ease-in forwards;
    }
    .water-amount {
      margin-top: 16px; text-align: center;
    }
    .water-amount .num {
      font-size: 28px; font-weight: bold; color: rgba(56,163,193,0.8); line-height: 1;
    }
    .water-amount .num.empty { color: #c44; }
    .water-amount .unit { font-size: 12px; color: #555; }
    .water-amount .label { font-size: 9px; color: #444; margin-top: 4px; }
    .empty-msg {
      margin-top: 20px; padding: 12px 16px;
      border: 1px solid rgba(196,68,68,0.3); color: #c44;
      font-size: 10px; letter-spacing: 2px; text-align: center;
      text-transform: uppercase; line-height: 1.6;
    }
    .empty-msg .sub { color: #666; font-size: 9px; }
    .context-stats {
      margin-top: 24px; font-size: 9px; color: #444;
      text-align: center; line-height: 2; max-width: 180px;
    }
    .receipt-section { flex: 1; max-width: 380px; min-width: 300px; }
    .receipt-paper {
      background-color: #f5f0e8; color: #1a1a1a;
      padding: 24px 20px; font-family: 'Courier New', monospace;
      font-size: 11px; min-height: 300px; position: relative;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .receipt-header { text-align: center; margin-bottom: 16px; }
    .receipt-header .title-text { font-size: 14px; font-weight: bold; letter-spacing: 3px; }
    .receipt-header .subtitle { font-size: 9px; color: #888; margin-top: 4px; }
    .receipt-header .divider { border-bottom: 1px dashed #ccc; margin: 12px 0; }
    .receipt-header .meta { font-size: 9px; color: #999; }
    .col-headers {
      display: flex; justify-content: space-between; font-size: 9px;
      color: #999; border-bottom: 1px solid #ddd;
      padding-bottom: 4px; margin-bottom: 8px;
    }
    .receipt-item {
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px dotted #ddd; animation: fadeIn 0.5s ease-in;
    }
    .receipt-item .row { display: flex; justify-content: space-between; align-items: flex-start; }
    .receipt-item .prompt-text { font-size: 10px; color: #333; }
    .receipt-item .char-info { font-size: 8px; color: #aaa; margin-top: 2px; }
    .receipt-item .water-val { width: 60px; text-align: right; font-size: 11px; font-weight: bold; color: #1a6b7a; }
    .receipt-item .energy-val { width: 50px; text-align: right; font-size: 10px; color: #666; }
    .empty-state {
      text-align: center; color: #bbb; font-size: 10px;
      padding: 40px 20px; line-height: 2;
    }
    .totals { margin-top: 12px; }
    .totals .total-row {
      border-top: 2px solid #333; padding-top: 8px;
      display: flex; justify-content: space-between;
      font-weight: bold; font-size: 12px;
    }
    .totals .total-water { color: #1a6b7a; }
    .totals .sub-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #888; margin-top: 4px;
    }
    .receipt-footer {
      margin-top: 20px; padding-top: 12px; border-top: 1px dashed #ccc;
      text-align: center; font-size: 8px; color: #aaa; line-height: 1.8;
    }
    .receipt-footer .punchline { margin-top: 8px; font-size: 9px; color: #999; }
    .input-area { margin-top: 20px; }
    .input-area textarea {
      width: 100%; min-height: 60px; background-color: #111;
      border: 1px solid #333; color: #e8e4dc;
      font-family: 'Courier New', monospace; font-size: 12px;
      padding: 12px; resize: vertical; outline: none;
    }
    .input-area textarea:focus { border-color: rgba(56,163,193,0.3); }
    .input-area textarea::placeholder { color: #333; }
    .input-controls {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 8px;
    }
    .input-controls .estimate { font-size: 9px; color: #444; }
    .input-controls button {
      background-color: transparent; border: 1px solid #444;
      color: #e8e4dc; font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 2px; padding: 8px 20px;
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    }
    .input-controls button:hover:not(:disabled) {
      border-color: rgba(56,163,193,0.5); color: rgba(56,163,193,0.8);
    }
    .input-controls button:disabled { color: #333; cursor: default; }
    @keyframes shimmer {
      0%, 100% { opacity: 0.3; transform: translateX(-10px); }
      50% { opacity: 0.8; transform: translateX(10px); }
    }
    @keyframes drip {
      0% { transform: translateX(-50%) translateY(0); opacity: 1; }
      100% { transform: translateX(-50%) translateY(40px); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 700px) {
      .main { flex-direction: column; align-items: center; }
      .glass-section { position: static; }
      .receipt-section { min-width: unset; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-stain"></div>
 
  <div class="title">
    <h1>Water Receipt</h1>
  </div>
 
  <div class="main">
    <!-- Glass -->
    <div class="glass-section">
      <div class="glass-label">250ml of water</div>
      <div class="glass-container">
        <div class="glass-outline">
          <div class="water-fill" id="waterFill">
            <div class="water-surface"></div>
          </div>
          <div class="measure-line" style="bottom:25%"></div>
          <div class="measure-line" style="bottom:50%"></div>
          <div class="measure-line" style="bottom:75%"></div>
        </div>
        <div class="drip" id="dripEl" style="display:none"></div>
      </div>
      <div class="water-amount">
        <div class="num" id="remainNum">250<span class="unit">ml</span></div>
        <div class="label">REMAINING</div>
      </div>
      <div class="empty-msg" id="emptyMsg" style="display:none">
        Empty.<br>
        <span class="sub" id="emptyCount"></span>
      </div>
      <div class="context-stats" id="contextStats" style="display:none">
        <div id="statWater"></div>
        <div id="statEnergy"></div>
        <div id="statCO2"></div>
      </div>
    </div>
 
    <!-- Receipt -->
    <div class="receipt-section">
      <div class="receipt-paper">
        <div class="receipt-header">
          <div class="title-text">WATER RECEIPT</div>
          <div class="subtitle">AI ENVIRONMENTAL COST TRACKER</div>
          <div class="divider"></div>
          <div class="meta" id="receiptDate"></div>
          <div class="meta" id="receiptSession"></div>
        </div>
        <div class="col-headers" id="colHeaders" style="display:none">
          <span style="flex:1">PROMPT</span>
          <span style="width:60px;text-align:right">WATER</span>
          <span style="width:50px;text-align:right">ENERGY</span>
        </div>
        <div id="receiptItems">
          <div class="empty-state">No prompts yet.<br>Type below to begin.<br><span style="font-size:16px">↓</span></div>
        </div>
        <div class="totals" id="totalsSection" style="display:none">
          <div class="total-row">
            <span id="totalLabel">TOTAL (0 prompts)</span>
            <span class="total-water" id="totalWater">0.0ml</span>
          </div>
          <div class="sub-row">
            <span>ELECTRICITY</span>
            <span id="totalEnergy">0.00 Wh</span>
          </div>
          <div class="sub-row">
            <span>CO₂ EMISSIONS</span>
            <span id="totalCO2">0.00g</span>
          </div>
        </div>
        <div class="receipt-footer">
          <div>* estimated environmental cost</div>
          <div class="punchline">This receipt is free.<br>The water was not.</div>
        </div>
      </div>
 
      <!-- Input -->
      <div class="input-area">
        <textarea id="promptInput" placeholder=""></textarea>
        <div class="input-controls">
          <span class="estimate" id="estimate"></span>
          <button id="sendBtn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>
 
 
 
  <script>
    const WATER_PER_CHAR = 0.15;
    const ENERGY_PER_CHAR = 0.005;
    const CO2_PER_CHAR = 0.001;
    const GLASS_ML = 250;
 
    const PLACEHOLDERS = [
      "Write me a poem about love...",
      "Explain quantum physics simply...",
      "Generate a business plan for...",
      "Create a recipe for dinner...",
      "Help me write an essay about...",
      "What is the meaning of life...",
      "Summarize this article for me...",
      "Draft an email to my boss...",
    ];
 
    let totalWater = 0, totalEnergy = 0, totalCO2 = 0, promptCount = 0;
    let waterLevel = 100;
    let isProcessing = false;
    let phIdx = 0, chIdx = 0, items = [];
 
    const $ = (id) => document.getElementById(id);
    const input = $("promptInput");
    const sendBtn = $("sendBtn");
 
    // Init receipt date
    const now = new Date();
    $("receiptDate").textContent = now.toLocaleDateString() + " · " + now.toLocaleTimeString();
    $("receiptSession").textContent = "SESSION #" + String(Date.now()).slice(-6);
 
    // Placeholder typing
    function typePlaceholder() {
      const prompt = PLACEHOLDERS[phIdx];
      if (chIdx <= prompt.length) {
        input.placeholder = prompt.slice(0, chIdx) + "│";
        chIdx++;
        setTimeout(typePlaceholder, 60);
      } else {
        setTimeout(() => {
          chIdx = 0;
          phIdx = (phIdx + 1) % PLACEHOLDERS.length;
          typePlaceholder();
        }, 2500);
      }
    }
    typePlaceholder();
 
    // Input events
    input.addEventListener("input", () => {
      const len = input.value.length;
      $("estimate").textContent = len > 0 ? `≈${(len * WATER_PER_CHAR * 5).toFixed(1)}ml estimated` : "";
      sendBtn.disabled = !input.value.trim() || isProcessing;
    });
 
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitPrompt(); }
    });
 
    sendBtn.addEventListener("click", submitPrompt);
 
    function submitPrompt() {
      const text = input.value.trim();
      if (!text || isProcessing) return;
      isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.textContent = "Processing...";
 
      const chars = text.length;
      const mult = 3 + Math.random() * 4;
      const responseChars = Math.floor(chars * mult);
      const w = (chars + responseChars) * WATER_PER_CHAR;
      const e = (chars + responseChars) * ENERGY_PER_CHAR;
      const c = (chars + responseChars) * CO2_PER_CHAR;
 
      // Drip animation
      const drip = $("dripEl");
      drip.style.display = "block";
      drip.style.animation = "none";
      drip.offsetHeight;
      drip.style.animation = "drip 1s ease-in forwards";
 
      setTimeout(() => {
        drip.style.display = "none";
 
        promptCount++;
        totalWater += w;
        totalEnergy += e;
        totalCO2 += c;
        waterLevel = Math.max(0, 100 - (totalWater / GLASS_ML) * 100);
 
        // Update glass with color shift
        const fill = $("waterFill");
        fill.style.height = waterLevel + "%";
        
        // Color shifts: blue (100%) → murky teal (60%) → amber (30%) → red (0%)
        let topR, topG, topB, topA, botR, botG, botB, botA;
        if (waterLevel > 60) {
          // Clean blue
          const t = (waterLevel - 60) / 40;
          topR = 56; topG = 163; topB = 193; topA = 0.15 + t * 0.5;
          botR = 30; botG = 100; botB = 140; botA = 0.25 + t * 0.5;
        } else if (waterLevel > 30) {
          // Murky teal → amber
          const t = (waterLevel - 30) / 30;
          topR = Math.round(56 + (1 - t) * 140); topG = Math.round(163 - (1 - t) * 100); topB = Math.round(193 - (1 - t) * 150); topA = 0.5;
          botR = Math.round(30 + (1 - t) * 120); botG = Math.round(100 - (1 - t) * 50); botB = Math.round(140 - (1 - t) * 110); botA = 0.6;
        } else {
          // Amber → deep red
          const t = waterLevel / 30;
          topR = Math.round(196 + (1 - t) * 40); topG = Math.round(63 - (1 - t) * 30); topB = Math.round(43 - (1 - t) * 20); topA = 0.6;
          botR = Math.round(150 + (1 - t) * 50); botG = Math.round(50 - (1 - t) * 30); botB = Math.round(30 - (1 - t) * 15); botA = 0.75;
        }
        fill.style.background = `linear-gradient(180deg, rgba(${topR},${topG},${topB},${topA}) 0%, rgba(${botR},${botG},${botB},${botA}) 100%)`;
 
        // Update remaining
        const remain = Math.max(0, (waterLevel / 100) * GLASS_ML);
        const numEl = $("remainNum");
        numEl.innerHTML = remain.toFixed(0) + '<span class="unit">ml</span>';
        // Match number color to water
        if (remain <= 0) { numEl.style.color = "#c44"; }
        else if (waterLevel > 60) { numEl.style.color = "rgba(56,163,193,0.8)"; }
        else if (waterLevel > 30) { numEl.style.color = "rgba(196,130,43,0.8)"; }
        else { numEl.style.color = "rgba(196,63,43,0.8)"; }
 
        // Empty message
        if (remain <= 0) {
          $("emptyMsg").style.display = "block";
          $("emptyCount").textContent = `${promptCount} prompt${promptCount !== 1 ? "s" : ""}.`;
        }
 
        // Context stats
        $("contextStats").style.display = "block";
        $("statWater").textContent = `≈ ${totalWater >= 1000 ? (totalWater / 1000).toFixed(2) + "L" : totalWater.toFixed(1) + "ml"} consumed`;
        $("statEnergy").textContent = `≈ ${totalEnergy.toFixed(2)} Wh electricity`;
        $("statCO2").textContent = `≈ ${totalCO2.toFixed(2)}g CO₂`;
 
        // Add receipt item
        const truncated = text.slice(0, 40) + (text.length > 40 ? "..." : "");
        if (promptCount === 1) {
          $("receiptItems").innerHTML = "";
          $("colHeaders").style.display = "flex";
        }
 
        const itemDiv = document.createElement("div");
        itemDiv.className = "receipt-item";
        itemDiv.innerHTML = `
          <div class="row">
            <div style="flex:1;padding-right:8px">
              <div class="prompt-text">#${promptCount} "${truncated}"</div>
              <div class="char-info">${chars} chars in → ${responseChars} chars out</div>
            </div>
            <div class="water-val">${w.toFixed(1)}ml</div>
            <div class="energy-val">${e.toFixed(1)}Wh</div>
          </div>`;
        $("receiptItems").appendChild(itemDiv);
 
        // Update totals
        $("totalsSection").style.display = "block";
        $("totalLabel").textContent = `TOTAL (${promptCount} prompt${promptCount !== 1 ? "s" : ""})`;
        $("totalWater").textContent = totalWater.toFixed(1) + "ml";
        $("totalEnergy").textContent = totalEnergy.toFixed(2) + " Wh";
        $("totalCO2").textContent = totalCO2.toFixed(2) + "g";
 
        // Scroll receipt
        itemDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
 
        // Reset
        input.value = "";
        $("estimate").textContent = "";
        isProcessing = false;
        sendBtn.textContent = "Send";
        sendBtn.disabled = true;
        input.focus();
      }, 1200);
    }
 
    // Init water fill
    $("waterFill").style.height = "100%";
    $("waterFill").style.background = "linear-gradient(180deg, rgba(56,163,193,0.65) 0%, rgba(30,100,140,0.75) 100%)";
  </script>
</body>
</html>
